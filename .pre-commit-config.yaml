# ============================================================
# .pre-commit-config.yaml
# ============================================================
# 渲染产物（DO NOT EDIT） — 由 scripts/render_meta.py 从 conventions/_meta.yaml 自动生成
# 修改流程：改 conventions/_meta.yaml → 跑 render_meta.py --render
# 不要手改本文件！手改会被 render_meta.py --check 检测到（CI fail）
# ============================================================
# 对应规范: 02-coding 红线 1/4/5, 03-git 红线 2, 06-documentation 红线（worklog 引用）
# 安装: pip install pre-commit && pre-commit install
#       && pre-commit install --hook-type commit-msg
# ============================================================
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=10000']

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.16.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        config: commitlint.config.js

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.0
    hooks:
      - id: ruff
        args: ['--config=src/coding/ruff.toml']
        stages: [pre-commit]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: markdownlint
        name: markdownlint
        entry: python scripts/lint_markdown.py
        language: system
      - id: commit-msg-worklog-ref
        name: commit-msg must reference worklog file
        stages: [commit-msg]
        entry: python scripts/check_worklog_ref.py
        language: python
      - id: commit-msg-status-updated
        name: worklog change requires STATUS.md sync
        stages: [commit-msg]
        entry: python scripts/check_status_updated.py
        language: python
      - id: commit-msg-worklog-structure
        name: worklog must have required sections
        stages: [commit-msg]
        entry: python scripts/check_worklog_structure.py
        language: python
      - id: commit-msg-file-placement
        name: new files must follow FILE_GRAPH decision tree
        stages: [commit-msg]
        entry: python scripts/check_file_placement.py
        language: python
      - id: commit-msg-exemption-log
        name: skip markers must be registered in exemption log
        stages: [commit-msg]
        entry: python scripts/check_exemption_log.py
        language: python
      - id: commit-msg-updated-tag
        name: managed files must refresh update tag
        stages: [commit-msg]
        entry: python scripts/check_updated_tag.py
        language: python
      - id: commit-msg-convergence-gate
        name: convergence gate blocks over-threshold delivery
        stages: [commit-msg]
        entry: python scripts/check_convergence_gate.py
        language: python
      - id: commit-msg-html-artifact
        name: html artifacts must match template family contracts
        stages: [commit-msg]
        entry: python scripts/check_html_artifact.py
        language: python
      - id: commit-msg-decision-alignment
        name: undecided owner decisions block delivery
        stages: [commit-msg]
        entry: python scripts/check_decision_alignment.py
        language: python
      - id: commit-msg-doc-sync
        name: fp row changes must sync STATUS/plan/CLAUDE
        stages: [commit-msg]
        entry: python scripts/check_doc_sync.py
        language: python
