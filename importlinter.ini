# ============================================================
# importlinter.ini — 架构依赖契约（01-architecture §二 落地）
# ============================================================
# L1 检测：pip install import-linter && lint-imports
# CI 接入：见 .github/workflows/ci.yml 的 lint stage
# L4 验证：见 tests/conventions/test_01_architecture.py
# 模板版本：docs/templates/devguard/importlinter.ini
# ============================================================

[importlinter]
root_package = src.architecture
include_external_packages = True

# 契约 1：分层单向依赖（红线 3：禁止跨层调用）
# DDD 依赖倒置：表现层 → 应用层 → 基础设施层 → 领域层
# domain 最下层（定义接口），infrastructure 实现 domain 接口（依赖倒置）
[importlinter:contract:layers]
name = 分层单向依赖
type = layers
layers =
    src.architecture.presentation
    src.architecture.application
    src.architecture.infrastructure
    src.architecture.domain

# 契约 2：领域层不依赖框架（红线 2：领域层纯净）
[importlinter:contract:domain-pure]
name = 领域层不依赖框架
type = forbidden
source_modules = src.architecture.domain
forbidden_modules =
    fastapi
    sqlalchemy
    django
    flask
    tornado
