# ============================================================
# openapi.yaml — 04-api §二 落地的 OpenAPI 示例（spectral lint 目标）
# ============================================================
# 对应 src/api/main.py（FastAPI 用户管理 API）
# L1 检测：npx @stoplight/spectral-cli lint src/api/openapi.yaml --ruleset .spectral.yaml
# ============================================================
openapi: 3.0.3
info:
  title: 用户管理 API
  description: 演示 RESTful API 设计规范（04-api 落地示例）
  version: 1.0.0
  contact:
    name: devguard
    email: devguard@example.com
servers:
  - url: /api/v1
    description: API v1 基路径
tags:
  - name: users
    description: 用户管理
security:
  - bearerAuth: []
paths:
  /api/v1/users:
    get:
      operationId: listUsers
      description: 用户列表（分页+排序+搜索）
      tags: [users]
      parameters:
        - name: page
          in: query
          description: 页码
          schema: { type: integer, minimum: 1, default: 1 }
        - name: page_size
          in: query
          description: 每页数量
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: sort_by
          in: query
          description: 排序字段
          schema: { type: string, default: id }
        - name: sort_order
          in: query
          description: 排序方向
          schema: { type: string, enum: [asc, desc], default: asc }
        - name: search
          in: query
          description: 搜索关键词
          schema: { type: string }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 0 }
                  message: { type: string, example: ok }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: string }
                            name: { type: string }
                            email: { type: string }
                      total: { type: integer }
                      page: { type: integer }
                      page_size: { type: integer }
                required: [code, message, data]
    post:
      operationId: createUser
      description: 创建用户
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, minLength: 1, maxLength: 50 }
                email: { type: string, pattern: '^[^@]+@[^@]+\.[^@]+$' }
              required: [name, email]
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 0 }
                  message: { type: string, example: ok }
                  data:
                    type: object
                    properties:
                      id: { type: string }
                      name: { type: string }
                      email: { type: string }
                required: [code, message, data]
        '409':
          description: 邮箱重复
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 40901 }
                  message: { type: string }
                  data: { type: string, example: '' }
                required: [code, message, data]
  /api/v1/users/{user-id}:
    get:
      operationId: getUser
      description: 获取单个用户
      tags: [users]
      parameters:
        - name: user-id
          in: path
          required: true
          description: 用户 ID
          schema: { type: string }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 0 }
                  message: { type: string, example: ok }
                  data:
                    type: object
                    properties:
                      id: { type: string }
                      name: { type: string }
                      email: { type: string }
                required: [code, message, data]
        '404':
          description: 用户不存在
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 40401 }
                  message: { type: string }
                  data: { type: string, example: '' }
                required: [code, message, data]

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Bearer Token 认证（04-api 红线 5：默认需认证）
