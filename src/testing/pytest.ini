# 05-测试规范 §二「落地」的可运行示例（覆盖率门禁）
# 用法: pip install pytest pytest-cov && pytest src/testing/
# 等价配置也可写进 pyproject.toml 的 [tool.pytest.ini_options]

[pytest]
# --cov-branch 开分支覆盖；--cov-fail-under 低于阈值则 CI 失败（红线：覆盖率门禁）
addopts = --cov=discount --cov-branch --cov-fail-under=80 -v
# 乱序执行验证「测试独立、不依赖顺序」（需 pip install pytest-randomly 后自动生效）
