# 01-架构设计规范 §二「落地」的可运行示例
# 用法: pip install import-linter && lint-imports --config src/architecture/importlinter.ini
# 对照 main.py 演示的四层结构（presentation → application → domain → infrastructure）

[importlinter]
root_package = architecture

[importlinter:contract:layers]
name = 分层单向依赖（上层可依赖下层，下层不反向引用上层）
type = layers
layers =
    architecture.presentation
    architecture.application
    architecture.domain
    architecture.infrastructure

[importlinter:contract:domain-pure]
name = 领域层不依赖框架/ORM（只准标准库 + 领域接口）
type = forbidden
source_modules = architecture.domain
forbidden_modules =
    fastapi
    sqlalchemy
    django
