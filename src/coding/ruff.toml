# 02-代码编写规范 §二「落地」的可运行示例
# 等价于 pyproject.toml 的 [tool.ruff] 段（ruff.toml 不需要 [tool.ruff] 前缀）
# 用法: pip install ruff && ruff check src/coding/

line-length = 100

[lint]
# T20=print/pprint  S=安全(bandit)  E722=裸except  T100=调试断点(pdb)  N=命名  PLR0915=函数过长
select = ["E", "F", "N", "T20", "T100", "S", "PLR0915"]

[lint.pylint]
max-statements = 50   # 函数语句数警告阈值，按项目可调

[lint.per-file-ignores]
# 整体规则：src/ 是规范示例代码（教学用），允许 print + 安全类 + 未使用 import
"src/**/*.py" = ["T20", "T100", "S", "F401"]

# 工具脚本：允许 print/pprint/pdb
"**/scripts/*.py" = ["T20", "T100"]
"**/html-report-template/*.py" = ["T20", "T100", "S603", "S607"]   # html-report 模板内的渲染脚本
"**/final-report-template/*.py" = ["T20", "T100", "S603", "S607"]   # final-report 模板内的渲染脚本 (V1.5)

# 测试文件：assert 是 pytest 标准用法（bandit S101 不适用）
# F401 = unused import（测试常有 fixture/import）
# S603/S607 = subprocess 调用（测试明确要跑 subprocess）
"tests/**/*.py" = ["S101", "F401", "S603", "S607"]

# 反面教材：保留命名违规（用于 L4 规范测试断言）
"src/coding/naming_bad.py" = ["N", "E", "F"]

# 注：call_graph_example.py 顶部加了 # ruff: noqa 整体豁免（AST API 约定命名）
