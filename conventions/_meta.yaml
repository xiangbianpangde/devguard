# ============================================================
# 2. pre-commit 钩子（#1 任务专用 / 写实）
# ============================================================
# v0.1 完整版（来源: src/git/.pre-commit-config.yaml，提升到根目录 + 元数据化）
# 后续改动只动本节 + 跑 render_meta.py 即可同步到根目录 .pre-commit-config.yaml
pre_commit:
  - id: trailing-whitespace
    source: pre-commit/pre-commit-hooks
    rev: v5.0.0
    grade: recommend
    maps_to: 通用整洁
    description: 去除行尾空白

  - id: end-of-file-fixer
    source: pre-commit/pre-commit-hooks
    rev: v5.0.0
    grade: recommend
    maps_to: 通用整洁
    description: 确保文件以换行符结尾

  - id: check-yaml
    source: pre-commit/pre-commit-hooks
    rev: v5.0.0
    grade: red_line
    maps_to: 通用整洁
    description: YAML 语法检查（_meta.yaml 修改后必须能解析）

  - id: check-json
    source: pre-commit/pre-commit-hooks
    rev: v5.0.0
    grade: red_line
    maps_to: 通用整洁
    description: JSON 语法检查

  - id: check-added-large-files
    source: pre-commit/pre-commit-hooks
    rev: v5.0.0
    grade: red_line
    maps_to: 通用整洁
    description: 防止误提交大文件
    args: ['--maxkb=10000']

  - id: ruff
    source: astral-sh/ruff-pre-commit
    rev: v0.6.0
    grade: red_line
    maps_to: 02-coding
    description: "02 红线 1/4/5：print / 裸 except / 调试断点等"
    stages: [pre-commit]
    args: ["--config=src/coding/ruff.toml"]   # 用项目内 02 规范的可运行配置

  - id: ruff-format
    source: astral-sh/ruff-pre-commit
    rev: v0.6.0
    grade: red_line
    maps_to: 02-coding
    description: 格式化（取代 black）
    args: ["--config=src/coding/ruff.toml"]

  - id: gitleaks
    source: gitleaks/gitleaks
    rev: v8.18.0
    grade: red_line
    maps_to: 02-coding
    description: "02 红线 3：阻止密钥入库"

  # markdownlint 钩子 V0.3 启用：markdownlint-cli2（npm，与 commitlint 复用生态）
  # .markdownlint.json 已配置：禁用软规则（MD037/001/056/051/035/030/029/058 等中文常见误报）
  - id: markdownlint
    name: markdownlint
    source: local
    grade: recommend
    maps_to: 06-documentation
    description: "06 文档规范 L1 检测：markdown 格式检查（Python 预过滤 .md 文件，绕开 cli glob 不被尊重问题）"
    entry: python scripts/lint_markdown.py
    language: system

  - id: ecc-alignment
    name: ECC capability alignment must stay above 80 percent
    source: local
    grade: red_line
    maps_to: 07-ai-workflow
    description: "ECC 全项目对标能力面必须具备可执行证据，得分不得低于 80%"
    entry: python scripts/check_ecc_alignment.py --threshold 80
    language: system
    pass_filenames: false

  - id: commitlint
    name: commit message must follow Conventional Commits
    source: local
    grade: red_line
    maps_to: 03-git
    description: "03 红线 2：commit message 符合 Conventional Commits"
    stages: [commit-msg]
    entry: npx --no -- commitlint --edit
    language: system

  - id: commit-msg-worklog-ref
    name: commit-msg must reference worklog file
    source: local
    grade: red_line
    maps_to: 06-documentation
    description: "06 红线：commit message 必须引用 worklog 文件（汇报不断档）"
    stages: [commit-msg]
    entry: python scripts/check_worklog_ref.py
    language: python

  - id: commit-msg-status-updated
    name: worklog and STATUS must stay synchronized
    source: local
    grade: red_line
    maps_to: 07-ai-workflow
    description: "修改 worklog 时必须同步 STATUS.md，且日期与最新 worklog 一致"
    stages: [commit-msg]
    entry: python scripts/check_status_updated.py
    language: system

  - id: commit-msg-worklog-structure
    name: staged worklogs must contain evidence sections
    source: local
    grade: red_line
    maps_to: 07-ai-workflow
    description: "worklog 必须含完成内容、验证结果、交接和已完成项"
    stages: [commit-msg]
    entry: python scripts/check_worklog_structure.py
    language: system

  - id: commit-msg-file-placement
    name: new files must follow FILE_GRAPH
    source: local
    grade: red_line
    maps_to: 06-documentation
    description: "新增文件必须落入 FILE_GRAPH 允许的位置，根目录默认拒绝"
    stages: [commit-msg]
    entry: python scripts/check_file_placement.py
    language: system

  - id: commit-msg-exemption-log
    name: skip markers must be registered and auditable
    source: local
    grade: red_line
    maps_to: 07-ai-workflow
    description: "任何 [skip-*] 必须登记并在本次提交新增完整使用记录"
    stages: [commit-msg]
    entry: python scripts/check_exemption_log.py
    language: system

  - id: commit-msg-updated-tag
    name: managed documents must refresh update tags
    source: local
    grade: red_line
    maps_to: 06-documentation
    description: "受管 Markdown 修改时必须把 > 更新: 日期刷新为当天"
    stages: [commit-msg]
    entry: python scripts/check_updated_tag.py
    language: system

  - id: commit-msg-doc-sync
    name: STATUS plan and AI context must stay structurally synchronized
    source: local
    grade: red_line
    maps_to: 07-ai-workflow
    description: "功能点结构改动必须同步 STATUS、开发清单与 CLAUDE"
    stages: [commit-msg]
    entry: python scripts/check_doc_sync.py
    language: system

  - id: commit-msg-convergence-gate
    name: delivery cannot cross an unconverged node
    source: local
    grade: red_line
    maps_to: 07-ai-workflow
    description: "越过预设但未收束节点时拒绝提交"
    stages: [commit-msg]
    entry: python scripts/check_convergence_gate.py
    language: system

# ============================================================
# 3. CI 配置（#2 任务专用）
# ============================================================
# v0.1 最小可用版：lint + test 已写实；l4-conventions/compliance/build 用条件 stage 自动激活
# 模板在 docs/templates/devguard/.github/workflows/ci.yml
ci:
  provider: github-actions
  python_version: '3.11'

  # 触发条件
  trigger:
    push:
      branches: [main, master]
    pull_request:
      branches: [main, master]
    workflow_dispatch: {}

  # 5 阶段流水线（每阶段独立 job，失败立即红）
  stages:
    - id: lint
      name: L1 lint（ruff + gitleaks + markdownlint + importlinter + spectral）
      runner: ubuntu-latest
      needs: []
      tools:
        - pip: ruff==0.6.0 pyyaml
        - pip: import-linter   # V10: 01-architecture L1（分层依赖契约 + 领域层纯净）
        - bin: gitleaks
        - bin: markdownlint   # V3.1 启用：markdownlint-cli + npm + Python 包装脚本 lint_markdown.py
        - bin: spectral        # V10: 04-api L1（npx @stoplight/spectral-cli）

    - id: test
      name: 仓库全量 pytest（失败闭合）
      runner: ubuntu-latest
      needs: []
      tools:
        - pip: pytest pyyaml
      cmd: python scripts/render_meta.py --check && pytest -q

    - id: l4-conventions
      name: L4 规范测试（#3 任务产出后自动激活）
      runner: ubuntu-latest
      needs: []
      conditional: "test -d tests/conventions && test -f scripts/render_meta.py"
      cmd: python scripts/render_meta.py --check && pytest tests/conventions/ -v

    - id: compliance
      name: 合规扫描（#10 任务产出后自动激活）
      runner: ubuntu-latest
      needs: []
      conditional: "test -f scripts/check_compliance.py"
      cmd: python scripts/check_compliance.py && python scripts/check_consistency.py --threshold 80

    - id: build
      name: 构建验证
      runner: ubuntu-latest
      needs: [lint, test, l4-conventions, compliance]
      cmd: python -m compileall src/ -q && python scripts/collect_l4_stats.py

# ============================================================
# 4. L4 规范测试（#3 任务专用 / v0.1 占位）
# ============================================================
l4_tests:
  root: tests/conventions/
  framework: pytest
  naming: test_NN_<convention_id>.py
  rule: 每篇规范的 §一红线至少 1 个 L4 test
  # 0 检测的规范不进 CI 流水线（convention-enforcer skill 原则）

# ============================================================
# 5. 渲染产物配置（scripts/render_meta.py 读这一节）
# ============================================================
render:
  targets:
    - kind: pre-commit-config
      output: .pre-commit-config.yaml
      template: pre_commit 节
    - kind: convention-grade
      output: 每篇规范顶部 ## 分级标签 小节
      template: conventions 节

