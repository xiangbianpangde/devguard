# ============================================================
# 2. pre-commit 钩子（#1 任务专用 / 写实）
# ============================================================
# v0.1 完整版（来源: src/git/.pre-commit-config.yaml，提升到根目录 + 元数据化）
# 后续改动只动本节 + 跑 render_meta.py 即可同步到根目录 .pre-commit-config.yaml
pre_commit:
  - id: trailing-whitespace
    source: pre-commit/pre-commit-hooks
    rev: v4.6.0
    grade: recommend
    maps_to: 通用整洁
    description: 去除行尾空白

  - id: end-of-file-fixer
    source: pre-commit/pre-commit-hooks
    rev: v4.6.0
    grade: recommend
    maps_to: 通用整洁
    description: 确保文件以换行符结尾

  - id: check-yaml
    source: pre-commit/pre-commit-hooks
    rev: v4.6.0
    grade: red_line
    maps_to: 通用整洁
    description: YAML 语法检查（_meta.yaml 修改后必须能解析）

  - id: check-json
    source: pre-commit/pre-commit-hooks
    rev: v4.6.0
    grade: red_line
    maps_to: 通用整洁
    description: JSON 语法检查

  - id: check-added-large-files
    source: pre-commit/pre-commit-hooks
    rev: v4.6.0
    grade: red_line
    maps_to: 通用整洁
    description: 防止误提交大文件
    args: ['--maxkb=10000']

  - id: ruff
    source: astral-sh/ruff-pre-commit
    rev: v0.6.0
    grade: red_line
    maps_to: 02-coding
    description: "02 红线 1/4/5：print / 裸 except / 调试断点等"
    stages: [pre-commit]
    args: ["--config=src/coding/ruff.toml"]   # 用项目内 02 规范的可运行配置

  - id: ruff-format
    source: astral-sh/ruff-pre-commit
    rev: v0.6.0
    grade: red_line
    maps_to: 02-coding
    description: 格式化（取代 black）

  - id: gitleaks
    source: gitleaks/gitleaks
    rev: v8.18.0
    grade: red_line
    maps_to: 02-coding
    description: "02 红线 3：阻止密钥入库"

  # markdownlint 钩子 V0.3 启用：markdownlint-cli2（npm，与 commitlint 复用生态）
  # .markdownlint.json 已配置：禁用软规则（MD037/001/056/051/035/030/029/058 等中文常见误报）
  - id: markdownlint
    name: markdownlint
    source: local
    grade: recommend
    maps_to: 06-documentation
    description: "06 文档规范 L1 检测：markdown 格式检查（Python 预过滤 .md 文件，绕开 cli glob 不被尊重问题）"
    entry: python scripts/lint_markdown.py
    language: system

  - id: commitlint
    source: alessandrojcm/commitlint-pre-commit-hook
    rev: v9.16.0
    grade: red_line
    maps_to: 03-git
    description: "03 红线 2：commit message 符合 Conventional Commits"
    stages: [commit-msg]
    config: commitlint.config.js

  - id: commit-msg-worklog-ref
    name: commit-msg must reference worklog file
    source: local
    grade: red_line
    maps_to: 06-documentation
    description: "06 红线：commit message 必须引用 worklog 文件且该文件真实在本次变更中（V2.1 #36 增强）"
    stages: [commit-msg]
    entry: python scripts/check_worklog_ref.py
    language: python

  - id: commit-msg-status-updated
    name: worklog change requires STATUS.md sync
    source: local
    grade: red_line
    maps_to: 06-documentation
    description: "06 汇报：改 worklog 必须同步更新 STATUS.md 且日期一致（V2.1 #37）；豁免 [skip-status]"
    stages: [commit-msg]
    entry: python scripts/check_status_updated.py
    language: python

  - id: commit-msg-worklog-structure
    name: worklog must have required sections
    source: local
    grade: red_line
    maps_to: 06-documentation
    description: "06 汇报：worklog 必须含必需段 + 至少 1 个完成项 [x]（V2.1 #38）；豁免 [skip-worklog-structure]"
    stages: [commit-msg]
    entry: python scripts/check_worklog_structure.py
    language: python

  - id: commit-msg-file-placement
    name: new files must follow FILE_GRAPH decision tree
    source: local
    grade: warning
    maps_to: meta/FILE_GRAPH.md
    description: "核心规则 1：新增文件按 FILE_GRAPH 决策树放置；根目录禁散文件（V2.1 #45）；豁免 [skip-file-placement]"
    stages: [commit-msg]
    entry: python scripts/check_file_placement.py
    language: python

  - id: commit-msg-exemption-log
    name: skip markers must be registered in exemption log
    source: local
    grade: red_line
    maps_to: meta/豁免清单.md
    description: "V2.3 #51 豁免登记强制化：commit message 含 [skip-*] 必须在 meta/豁免清单.md 登记并同步入暂存区；本钩子自身不可豁免"
    stages: [commit-msg]
    entry: python scripts/check_exemption_log.py
    language: python

  - id: commit-msg-updated-tag
    name: managed files must refresh update tag
    source: local
    grade: red_line
    maps_to: 06-documentation
    description: "V2.3 #53/#54 更新时间标签强制化：staged 在范围文档 .md（全仓减 templates/worklogs/.github/CHANGELOG）须含 `> 更新:` 且日期为今天；豁免 [skip-updated]"
    stages: [commit-msg]
    entry: python scripts/check_updated_tag.py
    language: python

  - id: commit-msg-convergence-gate
    name: convergence gate blocks over-threshold delivery
    source: local
    grade: red_line
    maps_to: 07-ai-workflow
    description: "V2.3 #52 收束硬闸门（节点驱动）：提交把'已交付最大功能点'推到越过 STATUS.md 预设收束节点时拒提交；豁免 [skip-gate]"
    stages: [commit-msg]
    entry: python scripts/check_convergence_gate.py
    language: python

  - id: commit-msg-html-artifact
    name: html artifacts must match template family contracts
    source: local
    grade: red_line
    maps_to: 10-templates-reporting
    description: "V2.3 #48 HTML 产出物结构校验：staged 受查 html（reports/plan-design/templates）带 doc-template 声明的须满足类型契约（8要素/五段式/8节/素材库4区）；untyped 仅 WARN；豁免 [skip-html]"
    stages: [commit-msg]
    entry: python scripts/check_html_artifact.py
    language: python

  - id: commit-msg-decision-alignment
    name: undecided owner decisions block delivery
    source: local
    grade: red_line
    maps_to: 07-ai-workflow
    description: "V2.3 #50 决策对齐强制：staged 设计提案须含「Owner 决策」节；提案仍有「待拍板」时同一提交不得交付功能点（拦开工）；豁免 [skip-align]"
    stages: [commit-msg]
    entry: python scripts/check_decision_alignment.py
    language: python

  - id: commit-msg-doc-sync
    name: fp row changes must sync STATUS/plan/CLAUDE
    source: local
    grade: red_line
    maps_to: 06-documentation
    description: "V2.3 阶段C 补遗（#52 拆出）四件套硬同步：编号功能点行的增/删须 STATUS↔开发清单 同步且 CLAUDE 同提交（增量比对）；值级改动仅 WARN；豁免 [skip-docsync]"
    stages: [commit-msg]
    entry: python scripts/check_doc_sync.py
    language: python

# ============================================================
# 3. CI 配置（#2 任务专用）
# ============================================================
# v0.1 最小可用版：lint + test 已写实；l4-conventions/compliance/build 用条件 stage 自动激活
# 模板在 docs/templates/devguard/.github/workflows/ci.yml
ci:
  provider: github-actions
  python_version: '3.11'

  # 触发条件
  trigger:
    push:
      branches: [main, master]
    pull_request:
      branches: [main, master]
    workflow_dispatch: {}

  # 5 阶段流水线（每阶段独立 job，失败立即红）
  stages:
    - id: lint
      name: L1 lint（ruff + gitleaks + markdownlint）
      runner: ubuntu-latest
      needs: []
      tools:
        - pip: ruff
        - bin: gitleaks
        - bin: markdownlint   # V3.1 启用：markdownlint-cli + npm + Python 包装脚本 lint_markdown.py

    - id: test
      name: pytest + 覆盖率门禁
      runner: ubuntu-latest
      needs: []
      tools:
        - pip: pytest pytest-cov
      cmd: pytest -q --cov=src --cov-fail-under=80 --cov-branch

    - id: l4-conventions
      name: L4 规范测试（#3 任务产出后自动激活）
      runner: ubuntu-latest
      needs: []
      conditional: "test -d tests/conventions && test -f scripts/render_meta.py"
      cmd: python scripts/render_meta.py --check && pytest tests/conventions/ -v

    - id: compliance
      name: 合规扫描（#10 任务产出后自动激活）
      runner: ubuntu-latest
      needs: []
      conditional: "test -f scripts/check_compliance.py"
      cmd: python scripts/check_compliance.py

    - id: build
      name: 构建验证
      runner: ubuntu-latest
      needs: [lint, test, l4-conventions, compliance]
      cmd: python -m compileall src/ -q

# ============================================================
# 4. L4 规范测试（#3 任务专用 / v0.1 占位）
# ============================================================
l4_tests:
  root: tests/conventions/
  framework: pytest
  naming: test_NN_<convention_id>.py
  rule: 每篇规范的 §一红线至少 1 个 L4 test
  # 0 检测的规范不进 CI 流水线（convention-enforcer skill 原则）

# ============================================================
# 5. 渲染产物配置（scripts/render_meta.py 读这一节）
# ============================================================
render:
  targets:
    - kind: pre-commit-config
      output: .pre-commit-config.yaml
      template: pre_commit 节
    - kind: convention-grade
      output: 每篇规范顶部 ## 分级标签 小节
      template: conventions 节

