name: DevGuard

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install declared governance dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Verify scaffold closure
        run: python scripts/devguard.py verify
      - name: Run all pre-commit gates
        run: python -m pre_commit run --all-files --show-diff-on-failure
      - name: Run governance tests
        run: python -m pytest tests/governance -q
