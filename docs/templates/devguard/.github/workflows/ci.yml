# ============================================================
# 模板：.github/workflows/ci.yml（5 阶段 CI 流水线）
# ============================================================
# 复制为:  {新项目仓库}/.github/workflows/ci.yml
# 配套:    复制 conventions/_meta.yaml（含 ci 节）+ scripts/render_meta.py
# 同步:    改 _meta.yaml ci 节 → 必须同步本文件
# ============================================================
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# 取消冗余运行（同一 PR 多次 push）
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------
  # 阶段 1：lint（L1 自动检查）
  # -------------------------------------------------------------
  lint:
    name: L1 lint (ruff + gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: ruff check
        # 用项目内的 ruff 配置（src/coding/ruff.toml 或 pyproject.toml）
        run: ruff check . --config src/coding/ruff.toml

      - name: ruff format check
        run: ruff format . --config src/coding/ruff.toml --check

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -------------------------------------------------------------
  # 阶段 2：test（pytest + 覆盖率门禁）
  # -------------------------------------------------------------
  test:
    name: pytest + coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install pytest + pytest-cov
        run: pip install pytest pytest-cov pyyaml

      - name: render_meta.py --check
        # 强制 .pre-commit-config.yaml / .pre-commit-config.yaml 等渲染产物与 _meta.yaml 一致
        run: python scripts/render_meta.py --check

      - name: pytest collect
        # v0.1：项目暂无业务测试，仅收集（不强制覆盖率门禁）
        # 等 L4 任务后加 tests/conventions/ 测试 → 启用 --cov-fail-under
        run: pytest -q --co || echo "no tests collected (OK for v0.1)"

  # -------------------------------------------------------------
  # 阶段 3：l4-conventions（L4 规范测试，自动激活）
  # -------------------------------------------------------------
  l4-conventions:
    name: L4 convention tests
    runs-on: ubuntu-latest
    # 条件 stage：tests/conventions/ 存在才跑
    if: hashFiles('tests/conventions/**.py') != ''
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install pytest pyyaml

      - name: render_meta.py --check
        run: python scripts/render_meta.py --check

      - name: pytest tests/conventions/
        run: pytest tests/conventions/ -v

  # -------------------------------------------------------------
  # 阶段 4：compliance（合规扫描，自动激活）
  # -------------------------------------------------------------
  compliance:
    name: Compliance scan
    runs-on: ubuntu-latest
    # 条件 stage：scripts/check_compliance.py 存在才跑
    if: hashFiles('scripts/check_compliance.py') != ''
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run compliance scan
        run: python scripts/check_compliance.py

  # -------------------------------------------------------------
  # 阶段 5：build（构建验证，依赖前 4 阶段）
  # -------------------------------------------------------------
  build:
    name: Build verification
    runs-on: ubuntu-latest
    needs: [lint, test, l4-conventions, compliance]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python compile check
        run: python -m compileall src/ -q
