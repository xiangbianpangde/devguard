# ============================================================
# 模板：importlinter.ini（架构依赖契约）
# ============================================================
# 复制为:  {新项目仓库}/importlinter.ini
# 配套:    src/<your_package>/ 目录结构（presentation/application/domain/infrastructure）
# L1 检测: pip install import-linter && lint-imports
# L4 验证: tests/conventions/test_NN_architecture.py
# 个性化:  改 root_package 为你的 Python 包路径
# ============================================================

[importlinter]
root_package = {your_package}    # <!-- 必填：你的 Python 包路径 -->

# 契约 1：分层单向依赖（红线 3：禁止跨层调用）
# 表现层 → 应用层 → 领域层 → 基础设施层
[importlinter:contract:layers]
name = 分层单向依赖
type = layers
layers =
    presentation
    application
    domain
    infrastructure

# 契约 2：领域层不依赖框架（红线 2：领域层纯净）
[importlinter:contract:domain-pure]
name = 领域层不依赖框架
type = forbidden
source_modules = {your_package}.domain
forbidden_modules =
    fastapi
    sqlalchemy
    django
    flask
    tornado
